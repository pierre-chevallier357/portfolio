<div animate.enter="enter-animation" class="home-wrapper">
  <!-- initial={{ y: 200, opacity: 0 }}
whileInView={{ y: 0, opacity: 1 }}
transition={{ duration: 2 }} -->
  <article>
    <h1 class="home-title">
      Hey !
      <br/>
      Je m'appelle <span [class]="'name' + (isDarkMode() ? ' dark' : ' light')">Pierre Chevallier</span>,
      <br/>
      Je suis
      <self-writing-text/>
    </h1>
    <home-nav-links/>
  </article>
  <img
    alt="Portrait de Pierre"
    class="profile-picture"
    height="450"
    ngSrc="images/home/profile-picture.png"
    priority
    width="450"
  />
</div>
